name: build-android-arm64

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'llama.cpp/**'
      - 'android-app/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llama.cpp

    steps:
      - uses: actions/checkout@v4
        with:
          path: llama.cpp

      - name: Setup Android NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "NDK version:"
          ls $ANDROID_NDK_HOME/ndk/

      - name: Configure CMake for Android arm64-v8a
        run: |
          NDK=$(ls -d $ANDROID_NDK_HOME/ndk/* | sort -V | tail -1)
          cmake -B build-android-arm64 \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_SERVER=ON \
            -DLLAMA_CURL=OFF \
            -DGGML_OPENMP=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DGGML_VULKAN=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build llama-server
        run: cmake --build build-android-arm64 --config Release -j$(nproc) --target llama-server

      - name: Copy artifacts
        run: |
          mkdir -p ../android-app/app/src/main/assets
          find build-android-arm64 -name "llama-server" -type f -exec cp {} ../android-app/app/src/main/assets/ \;
          file ../android-app/app/src/main/assets/llama-server

      - uses: actions/upload-artifact@v4
        with:
          name: llama-server-arm64
          path: android-app/app/src/main/assets/llama-server
